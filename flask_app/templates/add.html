<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #43cea2, #185a9d);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 400px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="card shadow p-4">
    <h3 class="text-center mb-3">➕ Add New Task</h3>

    <form method="POST">
        <input type="text" name="task" class="form-control mb-3" placeholder="Enter task..." required>

        <button class="btn btn-success w-100">Add Task</button>
        <a href="/" class="btn btn-secondary w-100 mt-2">Back</a>
    </form>
</div>

</body>
</html>
